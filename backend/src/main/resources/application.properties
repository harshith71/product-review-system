spring.application.name=review-system

# ── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/review_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Server ─────────────────────────────────────────────────
server.port=8080

# ── JWT ────────────────────────────────────────────────────
app.jwt.secret=ReviewHubSuperSecretKeyThatIsAtLeast256BitsLongXYZ1234567890
app.jwt.expiration=86400000

# ── Jackson ────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
